<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Play-Talk | Luxury Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#093eaa",
                        "background-light": "#fdfcf8", /* Premium warm cream */
                        "background-dark": "#101622",
                        "navy-deep": "#0d121c",
                        "cream-muted": "#f5f2eb",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        /* Custom geometric logo representation */
        .logo-circles {
            position: relative;
            width: 64px;
            height: 64px;
        }
        .circle-1 {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #093eaa;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .circle-2 {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #093eaa;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background-color: #fdfcf8;
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col selection:bg-primary/20">
<!-- Top Navigation Bar (Minimalist) -->
<header class="w-full px-8 py-6 flex justify-between items-center absolute top-0 left-0">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1">architecture</span>
</div>
<h1 class="text-navy-deep dark:text-slate-100 text-xl font-extrabold tracking-tight uppercase">Play-Talk</h1>
</div>
<div class="hidden md:block">
<p class="text-sm text-slate-500 font-medium">Global Language Community</p>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Geometric Abstract Logo Area -->
<div class="mb-10 flex flex-col items-center">
<div class="relative w-20 h-20 mb-6 flex items-center justify-center">
<!-- Custom SVG Logo: Overlapping circles with play button negative space concept -->
<svg class="w-full h-full text-primary fill-current" viewbox="0 0 100 100">
<circle cx="40" cy="50" fill="none" r="30" stroke="currentColor" stroke-width="2"></circle>
<circle cx="60" cy="50" fill="none" r="30" stroke="currentColor" stroke-width="2"></circle>
<path d="M48 40 L62 50 L48 60 Z"></path>
</svg>
</div>
<h2 class="text-3xl font-bold text-navy-deep dark:text-slate-100 tracking-tight text-center">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-center font-medium">Sign in to your luxury language community</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-navy-deep/60 dark:text-slate-400 ml-1" for="email">
                        Email Address
                    </label>
<div class="relative group">
<input class="w-full bg-transparent border-b-2 border-slate-200 dark:border-slate-700 py-4 px-1 focus:border-primary focus:ring-0 transition-colors text-navy-deep dark:text-slate-100 placeholder:text-slate-400 outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold uppercase tracking-widest text-navy-deep/60 dark:text-slate-400 ml-1" for="password">
                            Password
                        </label>
<a class="text-xs font-bold uppercase tracking-widest text-primary hover:text-primary/80 transition-colors" href="#">
                            Forgot?
                        </a>
</div>
<div class="relative group">
<input class="w-full bg-transparent border-b-2 border-slate-200 dark:border-slate-700 py-4 px-1 focus:border-primary focus:ring-0 transition-colors text-navy-deep dark:text-slate-100 placeholder:text-slate-400 outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-navy-deep" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 pt-2">
<input class="rounded border-slate-300 text-primary focus:ring-primary w-4 h-4 cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 rounded-lg transition-all shadow-lg shadow-primary/20 active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</div>
<!-- SSO Options -->
<div class="relative flex py-5 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-xs font-bold uppercase tracking-widest text-slate-400">or continue with</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-800 rounded-lg py-3 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
<span class="text-sm font-bold text-navy-deep dark:text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-800 rounded-lg py-3 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors" type="button">
<span class="material-symbols-outlined text-navy-deep dark:text-slate-200">ios</span>
<span class="text-sm font-bold text-navy-deep dark:text-slate-200">Apple</span>
</button>
</div>
</form>
<!-- Footer Sign Up -->
<div class="mt-10 text-center">
<p class="text-slate-600 dark:text-slate-400 font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</main>
<!-- Visual Decorative Element (Abstract Luxury) -->
<div class="fixed bottom-0 right-0 p-12 opacity-10 pointer-events-none hidden lg:block">
<div class="w-64 h-64 border-[1px] border-primary rounded-full absolute -bottom-20 -right-20"></div>
<div class="w-96 h-96 border-[1px] border-primary rounded-full absolute -bottom-40 -right-40"></div>
</div>
<!-- Legal Footer -->
<footer class="w-full py-8 px-8 flex justify-between items-center text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">
<div class="flex gap-6">
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
</div>
<div>
            © 2024 Play-Talk Interactive
        </div>
</footer>
</body></html>
