<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play-Talk | My Notes Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>

    <header class="topbar">
      <div class="topbar-start">
        <button class="icon-btn mobile-menu-btn" id="navToggle" type="button" aria-label="Open note navigation">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="brand">
          <div class="logo-mark" aria-hidden="true">
            <div class="diamond-frame"></div>
            <div class="diamond-core"></div>
            <div class="diamond-dot"></div>
          </div>
          <div class="brand-copy">
            <strong>Play-Talk</strong>
          </div>
        </div>
      </div>

      <label class="topbar-search" aria-label="Search notes">
        <span class="material-symbols-outlined">search</span>
        <input type="text" placeholder="Search notes..." />
      </label>

      <div class="topbar-end">
        <a class="topbar-link desktop-only" href="#">Explore</a>
        <span class="topbar-divider desktop-only" aria-hidden="true"></span>
        <button class="icon-btn desktop-only" type="button" aria-label="Open notifications">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <button class="icon-btn" type="button" aria-label="Open settings">
          <span class="material-symbols-outlined">settings</span>
        </button>
        <div class="profile-chip" aria-hidden="true">
          <img alt="Profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJNs3pntIX_1OxEZ2k3J1GgQHlvs1zaWdA_VoQfEt_pKZSOLY8vz6jfeRbTmAaw-_nI5fKs5BSw-WIfJwBKvbnIZ7XWDGKaoWayeSI5aaEj9eE2u8RZkUA-eIBLP6LGtMZFyPUdm2X2LQ4rB5HyX3jq6XFbIj_zJuKcjK1Okzzcy0poZt33rcG-dVwrjt_ZHcmcWFt03EluqZebZ4f9H3K-T2AbSxioXvsxiW-Bm2Rsge_tGXWlPzidOpoleKcjhOja5AliyUR_oI" />
        </div>
      </div>
    </header>

    <div class="shell-grid">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <p class="eyebrow">Language Tiers</p>
          <nav class="sidebar-nav" aria-label="Note collections">
            <button class="sidebar-link" type="button">
              <span class="material-symbols-outlined">menu_book</span>
              <span>Grammar</span>
            </button>
            <button class="sidebar-link" type="button">
              <span class="material-symbols-outlined">chat_bubble</span>
              <span>Casual</span>
            </button>
            <button class="sidebar-link" type="button">
              <span class="material-symbols-outlined">work</span>
              <span>Business</span>
            </button>
          </nav>
        </div>

        <div class="sidebar-section">
          <p class="eyebrow">My Activity</p>
          <nav class="sidebar-nav" aria-label="Saved note views">
            <button class="sidebar-link" type="button">
              <span class="material-symbols-outlined">dashboard_customize</span>
              <span>My Boards</span>
            </button>
            <button class="sidebar-link" type="button">
              <span class="material-symbols-outlined">campaign</span>
              <span>공지사항</span>
            </button>
            <button class="sidebar-link active" type="button">
              <span class="material-symbols-outlined">edit_note</span>
              <span>My Notes</span>
            </button>
            <button class="sidebar-link" type="button">
              <span class="material-symbols-outlined">star</span>
              <span>Starred</span>
            </button>
          </nav>
        </div>

        <div class="sidebar-footer membership-card">
          <p class="eyebrow">Pro Membership</p>
          <p class="section-copy">Unlock advanced business modules.</p>
          <p style="margin-top: 12px;">
            <button class="secondary-btn utility-btn" type="button" style="width: 100%; justify-content: center;">Upgrade Now</button>
          </p>
        </div>
      </aside>

      <main class="content-area">
        <section class="page-header">
          <div class="page-copy">
            <div class="breadcrumb">
              <span>Personal</span>
              <span class="material-symbols-outlined">chevron_right</span>
              <span class="is-active">My Notes</span>
            </div>
            <div>
              <h2>My Private Notes</h2>
              <p class="page-description">Manage and review your personal learning collection.</p>
            </div>
          </div>

          <div class="page-actions">
            <div class="toolbar-toggle" aria-label="Browse density mode">
              <button class="icon-btn" type="button" aria-label="Grid view">
                <span class="material-symbols-outlined">grid_view</span>
              </button>
              <button class="icon-btn active" type="button" aria-label="List view">
                <span class="material-symbols-outlined">format_list_bulleted</span>
              </button>
            </div>
            <button class="primary-btn desktop-only" type="button">
              <span class="material-symbols-outlined">add_circle</span>
              Create Note
            </button>
          </div>
        </section>

        <section>
          <div class="filters-bar">
            <div class="chip-row" aria-label="Category filters">
              <button class="filter-chip active" type="button">All Notes</button>
              <button class="filter-chip" type="button">Vocabulary</button>
              <button class="filter-chip" type="button">Grammar</button>
              <button class="filter-chip" type="button">Conversation</button>
            </div>

            <div class="filters-bar-actions desktop-only">
              <label class="eyebrow" for="page-size">Page Size</label>
              <div class="control-select">
                <select id="page-size" aria-label="Page size">
                  <option value="5">5</option>
                  <option value="15" selected>15</option>
                  <option value="30">30</option>
                  <option value="100">100</option>
                </select>
                <span class="material-symbols-outlined">expand_more</span>
              </div>
            </div>
          </div>
        </section>

        <section class="library-panel panel desktop-only desktop-library">
          <div class="library-table-shell">
            <div class="library-table-head">
              <div>Note Title</div>
              <div>Date Created</div>
              <div>Category</div>
              <div style="text-align: right;">Actions</div>
            </div>
            <div id="notes-list-body"></div>
          </div>
          <div class="pagination">
            <button id="prev-btn" class="ghost-btn" type="button">Previous</button>
            <div class="page-info" id="page-indicator"></div>
            <button id="next-btn" class="ghost-btn" type="button">Next</button>
          </div>
        </section>

        <section class="library-panel mobile-library panel">
          <div class="filters-bar-actions" style="margin-bottom: 14px;">
            <p class="eyebrow">View Capacity</p>
            <div class="chip-row" id="mobile-page-size-wrap" style="display: flex; gap: 8px; flex-wrap: wrap;">
              <button data-mobile-page-size="5" class="filter-chip" type="button">5</button>
              <button data-mobile-page-size="15" class="filter-chip active" type="button">15</button>
              <button data-mobile-page-size="30" class="filter-chip" type="button">30</button>
              <button data-mobile-page-size="100" class="filter-chip" type="button">100</button>
            </div>
          </div>

          <div id="mobile-notes-list" class="mobile-list"></div>

          <div class="pagination">
            <button id="mobile-prev-btn" class="ghost-btn" type="button">Prev</button>
            <div class="page-info" id="mobile-page-indicator"></div>
            <button id="mobile-next-btn" class="primary-btn" type="button">Next</button>
          </div>
        </section>
      </main>
    </div>

    <button class="floating-action mobile-only" type="button" aria-label="Create note">
      <span class="material-symbols-outlined">add</span>
    </button>
  </div>

  <script defer src="assets/js/note_library.js"></script>
</body>
</html>
